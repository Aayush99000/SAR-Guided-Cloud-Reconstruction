# @package _global_

defaults:
  - paths

# --- Training ---
training:
  learning_rate: 1.0e-4
  batch_size: 8
  num_epochs: 100
  seed: 42
  grad_clip: 1.0
  accumulate_grad_batches: 1
  val_every_n_epochs: 5
  save_every_n_epochs: 10
  mixed_precision: true   # bf16

# --- Optimizer ---
optimizer:
  name: adamw
  betas: [0.9, 0.999]
  weight_decay: 1.0e-4

scheduler:
  name: cosine
  warmup_steps: 1000

# --- Diffusion Bridge ---
diffusion:
  diffusion_steps: 1000
  alpha_schedule_type: sine   # "sine" | "linear" | "cosine"
  beta_min: 1.0e-4
  beta_max: 0.02
  ot_reg: 0.01               # OT regularisation weight
  sampler_nfe: 5             # number of function evaluations at inference

# --- Loss weights ---
loss:
  cloud_loss_alpha: 0.8      # weight on cloud-masked region loss
  lambda_mse: 1.0
  lambda_ssim: 0.5
  lambda_perceptual: 0.1
  lambda_adversarial: 0.05

# --- VQ-GAN ---
vqgan:
  latent_dim: 256
  num_embeddings: 8192
  embedding_dim: 256
  commitment_cost: 0.25
  encoder_channels: [64, 128, 256, 512]
  decoder_channels: [512, 256, 128, 64]
  num_res_blocks: 2

# --- U-Net backbone ---
unet:
  base_channels: 64
  channel_multipliers: [1, 2, 4, 8]
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  dropout: 0.1

# --- NAFNet ---
nafnet:
  width: 32
  enc_blks: [2, 2, 4, 8]
  dec_blks: [2, 2, 2, 2]
  middle_blk_num: 12

# --- Vision Mamba SSM ---
vim:
  d_model: 256
  d_state: 16
  d_conv: 4
  expand: 2
  bidirectional: true

# --- SAR Fusion Block ---
sar_fusion:
  num_heads: 8
  dropout: 0.0
  ffn_expansion: 4

# --- Data ---
data:
  patch_size: 256
  num_bands: 13             # Sentinel-2 bands
  sar_bands: 2              # Sentinel-1 VV+VH
  overlap: 32
  cloud_threshold: 0.2      # fraction of pixels to consider "cloudy"
  augmentation: true

# --- Logging ---
logging:
  project: sar_cloud_recon
  log_every_n_steps: 50
  use_wandb: false
  use_tensorboard: true
