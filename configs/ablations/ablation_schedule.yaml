# =============================================================================
# Ablation Study: Alpha Schedule  (forward bridge noise schedule)
# =============================================================================
#
# Research question:
#   Does the shape of the alpha_t schedule affect reconstruction quality?
#   All schedules satisfy α(0)=0, α(T)=1; they differ in the rate of
#   interpolation between x_clean and x_cloudy across training timesteps.
#
# Schedule formulae  (u = t/T ∈ [0, 1]):
#
#   Linear:  α(u) = u
#             Constant mixing rate.  Each training timestep equally weighted.
#             dα/du = 1.0 everywhere.
#
#   Sine:    α(u) = sin(πu/2)
#             Fast start (dα/du|₀ = π/2 ≈ 1.57), slow finish.
#             Model sees many near-clean states → fine detail recovery.
#             dα/du = (π/2)·cos(πu/2)
#
#   Cosine:  α(u) = 1 − cos(πu/2)   [DB-CR default, ours]
#             Slow start (dα/du|₀ = 0), fast finish.
#             Model sees many near-cloudy states → cloud structure learning.
#             dα/du = (π/2)·sin(πu/2)
#
# Training interpretation:
#   The loss is computed at a uniformly sampled t ∈ [t_low, t_high].
#   At large t (near-cloudy x_t), the network must hallucinate missing content.
#   At small t (near-clean x_t), it must refine fine texture.
#
#   Cosine (slow start) concentrates training at near-cloudy states, which is
#   where cloud removal is hardest.  This is why DB-CR uses cosine by default.
#
# Variants:
#
#   (a) Cosine  [OURS / DB-CR default]
#         diffusion.alpha_schedule_type: cosine
#         Expected: best on heavy-cloud strata (60-100% coverage)
#
#   (b) Sine
#         diffusion.alpha_schedule_type: sine
#         Expected: better fine texture; possibly worse on thick cloud
#
#   (c) Linear
#         diffusion.alpha_schedule_type: linear
#         Expected: intermediate; uniform difficulty across all timesteps
#
# Verification:
#   See noise_schedule_comparison.png (generated by models/bridge/noise_schedule.py)
#   for the plotted α(u) and dα/du curves confirming these formulae.
# =============================================================================

training:
  num_epochs: 100               # full training needed — schedule affects convergence
  seed: 100

logging:
  project: sar_ablation_schedule
  use_wandb: true

# Variant (a) — cosine schedule (our default)
# Shell script overrides diffusion.alpha_schedule_type for (b)/(c)
diffusion:
  alpha_schedule_type: cosine
